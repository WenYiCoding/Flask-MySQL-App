<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internship Tracker Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 40px;
            background-color: #f4f6f9;
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            margin-top: 0;
            color: #2c3e50;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }

        input,
        select,
        button {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        input {
            flex: 1;
        }

        button {
            background-color: #3498db;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background-color: #2980b9;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #f8f9fa;
            color: #2c3e50;
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            background-color: #ffeaa7;
            color: #d63031;
        }

        .status-badge.interviewing {
            background-color: #74b9ff;
            color: #0984e3;
        }

        .btn-delete {
            background-color: #e74c3c;
            padding: 5px 10px;
            font-size: 12px;
        }

        .btn-delete:hover {
            background-color: #c0392b;
        }

        .stats-container {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            margin-top: 20px;
        }

        .stat-card {
            flex: 1;
            background: #f8f9fa;
            border: 1px solid #e1e8ed;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
        }

        .stat-card h3 {
            margin: 0 0 5px 0;
            font-size: 14px;
            color: #7f8c8d;
            text-transform: uppercase;
        }

        .stat-card p {
            margin: 0;
            font-size: 24px;
            font-weight: bold;
            color: #2c3e50;
        }

        .stat-card.highlight {
            background-color: #ebf5fb;
            border-color: #a9dfbf;
        }

        .stat-card.highlight p {
            color: #2980b9;
        }

        select.status-applied {
            background-color: #fef9e7;
            color: #b7950b;
            border-color: #f9e79f;
            font-weight: bold;
        }

        select.status-interviewing {
            background-color: #ebf5fb;
            color: #2471a3;
            border-color: #a9cce3;
            font-weight: bold;
        }

        select.status-offered {
            background-color: #e8f8f5;
            color: #117a65;
            border-color: #a3e4d7;
            font-weight: bold;
        }

        select.status-rejected {
            background-color: #fadbd8;
            color: #943126;
            border-color: #f5b7b1;
            font-weight: bold;
        }

        .search-container {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #e1e8ed;
        }

        .search-container input {
            background-color: white;
        }

        .search-container select {
            background-color: white;
            min-width: 150px;
        }

        .btn-export {
            background-color: #2ecc71;
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            min-width: 120px;
        }

        .btn-export:hover {
            background-color: #27ae60;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 8px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .modal-content h3 {
            margin-top: 0;
            color: #c0392b;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        .btn-cancel {
            background-color: #bdc3c7;
            color: #333;
        }

        .btn-cancel:hover {
            background-color: #95a5a6;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>💼 My Internship Applications Dashboard</h1>

        <div class="stats-container">
            <div class="stat-card">
                <h3>Total Applications</h3>
                <p id="statTotal">0</p>
            </div>
            <div class="stat-card">
                <h3>Applied</h3>
                <p id="statApplied">0</p>
            </div>
            <div class="stat-card highlight">
                <h3>Interviewing</h3>
                <p id="statInterviewing">0</p>
            </div>
            <div class="stat-card">
                <h3>Offered</h3>
                <p id="statOffered">0</p>
            </div>
        </div>

        <div class="form-group">
            <input type="text" id="companyInput" placeholder="Company Name (e.g., Dyson)">
            <input type="text" id="jobInput" placeholder="Job Title (e.g., Backend Intern)">
            <button onclick="addNewApplication()">Add Application</button>
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" onkeyup="filterApplications()"
                placeholder="🔍 Search by Company or Job Title...">
            <select id="statusFilter" onchange="filterApplications()">
                <option value="All">All Statuses</option>
                <option value="Applied">Applied</option>
                <option value="Interviewing">Interviewing</option>
                <option value="Offered">Offered</option>
                <option value="Rejected">Rejected</option>
            </select>
            <button class="btn-export" onclick="exportDataToJSON()">📥 Export Backup</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Company</th>
                    <th>Job Title</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="applicationsTableBody">
            </tbody>
        </table>
    </div>
    <script>
        const API_URL = "/api";
        let applicationIdToDelete = null;

        async function loadDashboard() {
            try {
                const res = await fetch(`${API_URL}/applications`);
                const result = await res.json();

                const tbody = document.getElementById("applicationsTableBody");
                tbody.innerHTML = "";

                const apps = result.data || result.message;

                apps.forEach(app => {
                    const tr = document.createElement('tr');

                    let bedgeClass = app.apply_status.toLowerCase() === 'interviewing' ? 'interviewing' : '';

                    const statusClass = app.apply_status.toLowerCase();

                    tr.innerHTML = `
                        <td>${app.id}</td>
                        <td><strong>${app.company_name}</strong></td>
                        <td>${app.job_title}</td>
                        <td>
                            <select class="status-${statusClass}" onchange="updateStatus(${app.id}, this.value)">
                                <option value="Applied" ${app.apply_status === 'Applied' ? 'selected' : ''}>Applied</option>
                                <option value="Interviewing" ${app.apply_status === 'Interviewing' ? 'selected' : ''}>Interviewing</option>
                                <option value="Offered" ${app.apply_status === 'Offered' ? 'selected' : ''}>Offered</option>
                                <option value="Rejected" ${app.apply_status === 'Rejected' ? 'selected' : ''}>Rejected</option>
                            </select>
                        </td>
                        <td><button class="btn-delete" onclick="deleteApplication(${app.id})">Delete</button></td>
                    `;

                    tbody.appendChild(tr);
                });

                updateStatsCards();
                filterApplications();
            }
            catch (err) {
                console.error("Dashboard failed to populate rows.", err);
            }
        }

        async function filterApplications() {
            const searchText = document.getElementById('searchInput').value.toLowerCase();
            const filterStatus = document.getElementById('statusFilter').value;

            const tableBody = document.getElementById('applicationsTableBody');
            const rows = tableBody.getElementsByTagName('tr');

            for (let i = 0; i < rows.length; i++) {
                const row = rows[i];
                const companyText = row.cells[1].innerText.toLowerCase();
                const jobText = row.cells[2].innerText.toLowerCase();
                const currentStatus = row.cells[3].querySelector('select').value;

                const matchesSearch = companyText.includes(searchText) || jobText.includes(searchText);
                const matchesStatus = (filterStatus === 'All') || (currentStatus === filterStatus);

                if (matchesSearch && matchesStatus) {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';
                }
            }
        }

        async function updateStatsCards() {
            try {
                const res = await fetch(`${API_URL}/stats`);
                const result = await res.json();

                if (result.status === "success") {
                    const stats = result.data;
                    document.getElementById('statTotal').innerText = stats.Total;
                    document.getElementById('statApplied').innerText = stats.Applied;
                    document.getElementById('statInterviewing').innerText = stats.Interviewing;
                    document.getElementById('statOffered').innerText = stats.Offered;
                }
            }
            catch (err) {
                console.error("Failed to refresh analytics boxes.", err);
            }
        }

        function cleanInputText(str) {
            console.log(str);
            if (!str) return '';
            return str.trim()
                .split(/\s+/)
                .map(word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase())
                .join(' ');
        }

        async function addNewApplication() {
            const rawCompany = document.getElementById('companyInput').value;
            const rawJob = document.getElementById('jobInput').value;

            const company = cleanInputText(rawCompany);
            const job = cleanInputText(rawJob);

            if (!company || !job) return alert("Please fill up both fields!");

            await fetch(`${API_URL}/add-application`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ company_name: company, job_title: job })
            });

            document.getElementById('companyInput').value = '';
            document.getElementById('jobInput').value = '';
            loadDashboard();
        }

        async function updateStatus(id, newStatus) {
            await fetch(`${API_URL}/update-status`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: id, status: newStatus })
            });
            loadDashboard();
        }

        async function deleteApplication(id) {
            applicationIdToDelete = id;
            document.getElementById('deleteModal').style.display = "flex";
        }

        function closeDeleteModal() {
            document.getElementById('deleteModal').style.display = 'none';
            applicationIdToDelete = null;
        }

        document.addEventListener("DOMContentLoaded", function () {
            document.getElementById('confirmDeleteBtn').addEventListener('click', async function () {
                if (!applicationIdToDelete) return;

                try {
                    await fetch(`${API_URL}/delete-application`, {
                        method: 'DELETE',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ id: applicationIdToDelete })
                    });

                    closeDeleteModal();
                    loadDashboard();
                } catch (err) {
                    console.error("Failed to commit deletion pipeline.", err);
                }
            });
        });

        loadDashboard();

        function setupKeyboardShortcuts() {
            const fields = ['companyInput', 'jobInput'];

            fields.forEach(id => {
                document.getElementById(id).addEventListener('keydown', function (event) {
                    if (event.key === 'Enter') {
                        event.preventDefault();
                        addNewApplication();
                    }
                });
            });
        }

        setupKeyboardShortcuts();

        async function exportDataToJSON() {
            try {
                const res = await fetch(`${API_URL}/applications`);
                const result = await res.json();
                const apps = result.data || result.message;

                if (!apps || apps.length == 0) {
                    return alert("No data available to export yet!");
                }

                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(apps, null, 4));

                const downloadAnchor = document.createElement('a');
                downloadAnchor.setAttribute("href", dataStr);

                const today = new Date().toISOString().split('T')[0];
                downloadAnchor.setAttribute('download', `internship_tracker_backup_${today}.json`);

                document.body.appendChild(downloadAnchor);
                downloadAnchor.click();
                document.body.removeChild(downloadAnchor);

            } catch (err) {
                console.error("Backup file generation engine encountered an error.", err);
                alert("Failed to export backup data.");
            }
        }
    </script>

    <div id="deleteModal" class="modal-overlay">
        <div class="modal-content">
            <h3>⚠️ Delete Application?</h3>
            <p>Are you sure you want to permanently erase this internship entry? This action cannot be reversed.</p>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeDeleteModal()">Cancel</button>
                <button class="btn-delete" id="confirmDeleteBtn">Yes, Delete</button>
            </div>
        </div>
    </div>

</body>

</html>
